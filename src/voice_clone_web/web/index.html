<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Clone Web</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">

    <!-- Top bar -->
    <header class="top-bar">
      <span class="app-title">Voice Clone</span>
      <div class="top-bar-sep"></div>
      <input id="clipFileInput" type="file" accept="audio/*,video/*" class="hidden">
      <div class="clip-display">
        <svg class="clip-icon" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M2 2.5A.5.5 0 0 1 2.5 2h5L10 4.5V11.5a.5.5 0 0 1-.5.5h-7a.5.5 0 0 1-.5-.5v-9Z" stroke="currentColor" stroke-width="1.2"/>
          <path d="M7.5 2v2.5H10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span id="clipName" class="clip-name-input">No clip selected</span>
      </div>
      <button id="loadClipBtn" class="btn-choose">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true" width="14" height="14">
          <path d="M2 10v3h12v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 2v8M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Choose Clip
      </button>
    </header>

    <div id="clipMeta" class="hidden"></div>

    <!-- Timeline -->
    <section class="panel timeline-panel">
      <div class="hidden-media">
        <video id="sourceVideo"></video>
        <audio id="sourceAudio"></audio>
      </div>

      <!-- Transport row -->
      <div class="transport-row">
        <!-- Play / pause -->
        <button id="sourcePlayBtn" class="icon-btn" aria-label="Play or pause source" title="Play/pause">
          <svg class="i-play" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.5 3.5 12.5 8 5.5 12.5z"/></svg>
          <svg class="i-pause" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="3.5" y="3.5" width="3" height="9" rx=".75"/><rect x="9.5" y="3.5" width="3" height="9" rx=".75"/></svg>
        </button>
        <!-- Play window -->
        <button id="windowPlayBtn" class="icon-btn" aria-label="Play selected window" title="Play window">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <rect x="1.5" y="3.25" width="13" height="9.5" rx="1.25" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6.5 6.25 10.5 8 6.5 9.75z" fill="currentColor"/>
          </svg>
        </button>

        <div class="t-sep"></div>

        <!-- Zoom out -->
        <button id="zoomOutBtn" class="icon-btn" aria-label="Zoom out" title="Zoom out">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="3.75" stroke-width="1.5"/>
            <line x1="4.75" y1="6.5" x2="8.25" y2="6.5" stroke-width="1.5"/>
            <line x1="9.75" y1="9.75" x2="12.75" y2="12.75" stroke-width="1.75"/>
          </svg>
        </button>
        <!-- Zoom in -->
        <button id="zoomInBtn" class="icon-btn" aria-label="Zoom in" title="Zoom in">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" aria-hidden="true">
            <circle cx="6.5" cy="6.5" r="3.75" stroke-width="1.5"/>
            <line x1="4.75" y1="6.5" x2="8.25" y2="6.5" stroke-width="1.5"/>
            <line x1="6.5" y1="4.75" x2="6.5" y2="8.25" stroke-width="1.5"/>
            <line x1="9.75" y1="9.75" x2="12.75" y2="12.75" stroke-width="1.75"/>
          </svg>
        </button>
        <!-- Zoom to selection -->
        <button id="zoomToWindowBtn" class="icon-btn" aria-label="Zoom to selection" title="Zoom to selection">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" aria-hidden="true">
            <path d="M2 5.5V2h3.5M10.5 2H14v3.5M14 10.5V14h-3.5M5.5 14H2v-3.5"/>
            <rect x="5" y="5" width="6" height="6" rx="1" stroke-width="1.25"/>
          </svg>
        </button>
        <!-- Fit all -->
        <button id="fitAllBtn" class="icon-btn" aria-label="Fit full timeline" title="Fit all">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" aria-hidden="true">
            <path d="M2 2h4.5M2 2v4.5M9.5 14H14M14 14v-4.5M14 2h-4.5M14 2v4.5M2 14h4.5M2 14v-4.5"/>
          </svg>
        </button>

        <!-- Status text (kept in DOM for JS, not displayed) -->
        <span id="playbackStatus" class="hidden"></span>
        <span id="windowStatus" class="hidden"></span>
      </div>

      <!-- Waveform -->
      <div class="waveform-shell">
        <canvas id="waveformCanvas" width="1400" height="150"></canvas>
      </div>

      <!-- Viewport scroll -->
      <div class="viewport-row">
        <input id="viewportScroll" type="range" min="0" max="1000" step="1" value="0" aria-label="Timeline scroll">
        <span id="viewportStatus" class="status-pill">Full timeline</span>
      </div>

      <!-- Selection controls: nudge + start/end -->
      <div class="selection-row">
        <button data-nudge="-1.0" class="icon-btn" aria-label="Move left 1s" title="Move left 1 s">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <rect x="2.5" y="3.5" width="2" height="9" rx=".5"/>
            <path d="M13.5 4 6 8l7.5 4z"/>
          </svg>
        </button>
        <button data-nudge="-0.2" class="icon-btn" aria-label="Move left 0.2s" title="Move left 0.2 s">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M12 3.5 4.5 8 12 12.5z"/></svg>
        </button>
        <label class="time-label">
          <span>Start</span>
          <input id="startNumber" type="number" min="0" step="0.05">
        </label>
        <input id="startRange" type="range" min="0" max="10" step="0.05" class="flex-range" aria-label="Start slider">
        <input id="endRange" type="range" min="0.1" max="10" step="0.05" class="flex-range" aria-label="End slider">
        <label class="time-label">
          <span>End</span>
          <input id="endNumber" type="number" min="0.1" step="0.05">
        </label>
        <button data-nudge="0.2" class="icon-btn" aria-label="Move right 0.2s" title="Move right 0.2 s">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 3.5 11.5 8 4 12.5z"/></svg>
        </button>
        <button data-nudge="1.0" class="icon-btn" aria-label="Move right 1s" title="Move right 1 s">
          <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M2.5 4 10 8l-7.5 4z"/>
            <rect x="11.5" y="3.5" width="2" height="9" rx=".5"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Bottom: reference text | target text + generate -->
    <div class="bottom-grid">

      <!-- Reference text -->
      <section class="panel text-panel">
        <div class="panel-head">
          <h2>Reference Text</h2>
          <select id="referenceLanguageSelect" class="select-sm" aria-label="Reference language"></select>
          <button id="asrBtn" class="btn">Auto ASR</button>
        </div>
        <div id="asrProgress" class="progress-row hidden">
          <span class="progress-label">Running ASR…</span>
          <div class="progress-track"><div class="progress-fill"></div></div>
          <span class="progress-pct">0%</span>
        </div>
        <textarea id="refText" placeholder="Auto-ASR result or manual override"></textarea>
      </section>

      <!-- Target text + generate -->
      <section class="panel generate-panel">
        <div class="panel-head">
          <h2>Target Text</h2>
          <select id="outputLanguageSelect" class="select-sm" aria-label="Output language"></select>
        </div>
        <textarea id="targetText"></textarea>
        <div id="genProgress" class="progress-row hidden">
          <span class="progress-label">Generating…</span>
          <div class="progress-track"><div class="progress-fill"></div></div>
          <span class="progress-pct">0%</span>
        </div>
        <div class="generate-row">
          <button id="generateBtn" class="btn-primary">Generate</button>
          <div id="validationBox" class="validation-box inline-validation">Load a clip to enable ASR and generation.</div>
        </div>
        <!-- statusBox kept in DOM for JS -->
        <div id="statusBox" class="hidden">Ready.</div>
        <!-- Custom audio player -->
        <div id="audioPlayerUI" class="audio-player-ui hidden">
          <button id="audioPlayBtn" class="icon-btn audio-play-btn" title="Play/pause">
            <svg class="i-play" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.5 3.5 12.5 8 5.5 12.5z"/></svg>
            <svg class="i-pause" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><rect x="3.5" y="3.5" width="3" height="9" rx=".75"/><rect x="9.5" y="3.5" width="3" height="9" rx=".75"/></svg>
          </button>
          <span id="audioCurrentTime" class="audio-time">0:00</span>
          <input id="audioSeek" type="range" min="0" max="1" step="0.001" value="0" class="audio-seek" aria-label="Seek">
          <span id="audioDuration" class="audio-time muted">–:––</span>
          <a id="savedWavLink" href="#" target="_blank" rel="noopener" class="audio-dl-btn hidden" title="Download WAV">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
              <path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/>
            </svg>
          </a>
        </div>
        <audio id="generatedAudio"></audio>
      </section>

    </div>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
